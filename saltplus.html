<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SÀLT+ AETERNA OS Preview</title>
    <style>
        /* Base Reset & Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace, sans-serif;
        }
        body {
            background-color: #040814;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
            padding: 20px;
        }

        /* Smartphone Mockup Container */
        .phone-frame {
            width: 380px;
            height: 780px;
            background: linear-gradient(180deg, #070e22 0%, #02050e 100%);
            border: 4px solid #bfa15f; /* Gold border like the image */
            border-radius: 40px;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.15);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 30px 24px;
        }

        /* Ambient glows */
        .phone-frame::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.05) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
        }

        /* Headers & Typography */
        .cyan-glow {
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.7);
            text-align: center;
            font-weight: bold;
        }

        .header-v1 {
            font-size: 11px;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        .brand-logo {
            font-size: 32px;
            letter-spacing: 4px;
            margin-bottom: 5px;
        }

        .sub-properties {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            letter-spacing: 1.5px;
            margin-bottom: 30px;
        }

        /* ==================== STATE 1: SIGN IN ==================== */
        #state-1 {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: space-between;
        }

        .pricing-card {
            text-align: center;
            margin-bottom: 15px;
        }

        .price-val {
            font-size: 54px;
            font-weight: bold;
            line-height: 1;
        }

        .price-period {
            font-size: 14px;
            color: #00f0ff;
            opacity: 0.8;
        }

        /* EM+ Badge Logo */
        .em-badge-container {
            position: relative;
            width: 110px;
            height: 110px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
        }

        .dotted-dial {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px dotted #00f0ff;
            border-radius: 50%;
            animation: spin 20s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .em-badge {
            width: 80px;
            height: 80px;
            background-color: #000;
            border: 3px solid #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 1px;
            z-index: 2;
        }

        /* Interactive Inputs */
        .input-container {
            width: 100%;
            margin-bottom: 25px;
            position: relative;
        }

        .pin-box {
            width: 100%;
            background: transparent;
            border: 1px solid #00f0ff;
            border-radius: 10px;
            padding: 15px;
            color: #fff;
            text-align: center;
            font-size: 16px;
            letter-spacing: 2px;
            outline: none;
            transition: all 0.3s;
        }

        .pin-box:focus {
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        /* System Action Buttons */
        .btn-action {
            width: 100%;
            background: transparent;
            border: 1.5px solid #00f0ff;
            color: #00f0ff;
            padding: 14px;
            border-radius: 25px;
            font-size: 13px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .btn-action:hover {
            background-color: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        .btn-primary-alt {
            background: linear-gradient(90deg, #ff7b47 0%, #ff4b72 100%);
            border: none;
            color: #fff;
        }

        .btn-primary-alt:hover {
            opacity: 0.9;
            box-shadow: 0 0 15px rgba(255, 75, 114, 0.4);
        }

        /* Tooltip style */
        .tooltip {
            font-size: 10px;
            color: #ffb74d;
            text-align: center;
            margin-top: 8px;
            display: none;
            line-height: 1.4;
        }

        /* ==================== STATE 2: ECOSYSTEM ==================== */
        #state-2 {
            display: none;
            flex-direction: column;
            height: 100%;
            justify-content: space-between;
        }

        .ecosystem-title {
            font-size: 18px;
            letter-spacing: 2px;
            margin-bottom: 25px;
            text-align: center;
        }

        /* Grid System */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px 10px;
            margin-bottom: 25px;
        }

        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .app-icon:hover {
            transform: scale(1.1);
        }

        .app-img {
            width: 44px;
            height: 44px;
            background-color: #fff;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 12px;
            color: #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .app-name {
            font-size: 8px;
            margin-top: 5px;
            color: rgba(255,255,255,0.7);
            text-align: center;
            text-transform: uppercase;
            font-weight: bold;
            white-space: nowrap;
        }

        /* Sub-Dock / Google Section */
        .google-dock {
            border: 1px solid rgba(0, 240, 255, 0.3);
            background: rgba(0, 240, 255, 0.03);
            border-radius: 18px;
            padding: 15px 10px;
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
        }

        .google-dock .app-img {
            border: 1.5px solid rgba(255,255,255,0.1);
        }

        /* Deactivate Button */
        .btn-deactivate {
            background-color: rgba(255, 0, 0, 0.05);
            border: 1px solid rgba(255, 75, 75, 0.5);
            color: #ff4b4b;
            width: 100%;
            padding: 12px;
            border-radius: 20px;
            cursor: pointer;
            letter-spacing: 2.5px;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-deactivate:hover {
            background-color: rgba(255, 75, 75, 0.2);
            box-shadow: 0 0 10px rgba(255, 75, 75, 0.3);
        }

        /* Custom styling for standard icons to simulate visual quality */
        .img-linkedin { background-color: #0077b5; color: #fff; }
        .img-fb { background-color: #1877f2; color: #fff; }
        .img-youtube { background-color: #ff0000; color: #fff; }
        .img-ig { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%); color: #fff; }
        .img-wa { background-color: #25d366; color: #fff; }
        .img-x { background-color: #000; color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .img-gemini { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: #fff; }
        .img-deepseek { background-color: #1a1cfc; color: #fff; }
        .img-telegram { background-color: #0088cc; color: #fff; }
        .img-chatgpt { background-color: #10a37f; color: #fff; }
    </style>
</head>
<body>

    <!-- Main Simulator Frame -->
    <div class="phone-frame">
        
        <!-- Constant Header -->
        <div class="cyan-glow header-v1">VIRTUAL SMARTPHONE V1</div>
        <div class="cyan-glow brand-logo">SÀLT+</div>
        <div class="sub-properties">- FAST+ — CHEAP — ENERGY -</div>

        <!-- ==================== STATE 1 SCREEN ==================== -->
        <div id="state-1">
            <div class="pricing-card">
                <div class="price-val">$3</div>
                <div class="price-period">/Month</div>
            </div>

            <div class="em-badge-container">
                <div class="dotted-dial"></div>
                <div class="em-badge">EM+</div>
            </div>

            <div class="input-container">
                <input type="text" id="credential-input" class="pin-box" placeholder="PIN" readonly>
                <div id="helper-tooltip" class="tooltip">Enter email and press Enter to receive 6-digit token</div>
            </div>

            <div style="width: 100%;">
                <button id="btn-init" class="btn-action">INITIALIZE SYSTEM</button>
                <button id="btn-start" class="btn-action btn-primary-alt">Start to Salt+ →</button>
            </div>
        </div>

        <!-- ==================== STATE 2 SCREEN ==================== -->
        <div id="state-2">
            <div class="cyan-glow ecosystem-title">SÀLT+ ECOSYSTEM</div>

            <!-- Main App Grid -->
            <div class="app-grid">
                <!-- Row 1 -->
                <div class="app-icon" onclick="launchApp('LinkedIn')"><div class="app-img img-linkedin">in</div><div class="app-name">LinkedIn</div></div>
                <div class="app-icon" onclick="launchApp('FB')"><div class="app-img img-fb">f</div><div class="app-name">FB</div></div>
                <div class="app-icon" onclick="launchApp('YouTube')"><div class="app-img img-youtube">▶</div><div class="app-name">YouTube</div></div>
                <div class="app-icon" onclick="launchApp('IG')"><div class="app-img img-ig">📸</div><div class="app-name">IG</div></div>
                <div class="app-icon" onclick="launchApp('WA')"><div class="app-img img-wa">💬</div><div class="app-name">WA</div></div>
                <!-- Row 2 -->
                <div class="app-icon" onclick="launchApp('Gemini')"><div class="app-img img-gemini">✦</div><div class="app-name">Gemini</div></div>
                <div class="app-icon" onclick="launchApp('X')"><div class="app-img img-x">𝕏</div><div class="app-name">X</div></div>
                <div class="app-icon" onclick="launchApp('DeepSeek')"><div class="app-img img-deepseek">🐋</div><div class="app-name">DeepSeek</div></div>
                <div class="app-icon" onclick="launchApp('Telegram')"><div class="app-img img-telegram">✈</div><div class="app-name">Telegram</div></div>
                <div class="app-icon" onclick="launchApp('ChatGPT')"><div class="app-img img-chatgpt">⚛</div><div class="app-name">ChatGPT</div></div>
                <!-- Row 3 -->
                <div class="app-icon" onclick="launchApp('CNN')"><div class="app-img" style="background-color: #cc0000; color: #fff;">CNN</div><div class="app-name">CNN</div></div>
                <div class="app-icon" onclick="launchApp('Time')"><div class="app-img" style="background-color: #000; border: 1.5px solid #ff0000; color: #ff0000;">T</div><div class="app-name">Time</div></div>
                <div class="app-icon" onclick="launchApp('Guardian')"><div class="app-img" style="background-color: #005689; color: #fff;">G</div><div class="app-name">Guardian</div></div>
                <div class="app-icon" onclick="launchApp('WSJ')"><div class="app-img" style="background-color: #111; color: #fff;">WSJ</div><div class="app-name">WSJ</div></div>
                <div class="app-icon" onclick="launchApp('ESPN')"><div class="app-img" style="background-color: #cc0000; color: #fff; font-style: italic;">E</div><div class="app-name">ESPN</div></div>
            </div>

            <!-- Sub dock / Google Apps Section -->
            <div class="google-dock">
                <div class="app-icon" onclick="launchApp('Gmail')"><div class="app-img" style="color: #ea4335;">✉</div><div class="app-name">Gmail</div></div>
                <div class="app-icon" onclick="launchApp('Photos')"><div class="app-img" style="color: #4285f4;">✿</div><div class="app-name">Photos</div></div>
                <div class="app-icon" onclick="launchApp('Search')"><div class="app-img" style="color: #34a853;">🔍</div><div class="app-name">Search</div></div>
                <div class="app-icon" onclick="launchApp('News')"><div class="app-img" style="color: #fbbc05;">📰</div><div class="app-name">News</div></div>
            </div>

            <button id="btn-deactivate" class="btn-deactivate">DEACTIVATE SYSTEM</button>
        </div>

    </div>

    <!-- Interface Controller Logic -->
    <script>
        const state1 = document.getElementById('state-1');
        const state2 = document.getElementById('state-2');
        const inputField = document.getElementById('credential-input');
        const helperTooltip = document.getElementById('helper-tooltip');
        const btnInit = document.getElementById('btn-init');
        const btnStart = document.getElementById('btn-start');
        const btnDeactivate = document.getElementById('btn-deactivate');

        let isWaitingForEmail = false;
        let isWaitingForPin = false;

        // Action when Clicking Initializer buttons
        function initiateWorkflow() {
            if (!isWaitingForEmail && !isWaitingForPin) {
                isWaitingForEmail = true;
                inputField.removeAttribute('readonly');
                inputField.placeholder = "User Email Address";
                inputField.value = "";
                inputField.focus();
                helperTooltip.style.display = "block";
            }
        }

        btnInit.addEventListener('click', initiateWorkflow);
        btnStart.addEventListener('click', initiateWorkflow);

        // Handle Input Submission (Enter Key)
        inputField.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const value = inputField.value.trim();
                
                if (isWaitingForEmail) {
                    if (value === "" || !value.includes('@')) {
                        alert("Mohon masukkan alamat email yang valid!");
                        return;
                    }
                    
                    // Simulate routing email
                    inputField.disabled = true;
                    helperTooltip.textContent = "Mengirim kode token keamanan...";
                    
                    setTimeout(() => {
                        inputField.disabled = false;
                        isWaitingForEmail = false;
                        isWaitingForPin = true;
                        
                        alert("TOKEN DIKIRIM!\nKode Token Anda untuk login ke simulasi ini adalah: free7d");
                        
                        inputField.value = "";
                        inputField.placeholder = "ENTER 6-DIGIT PIN";
                        helperTooltip.textContent = "Masukkan token PIN: free7d lalu klik Enter";
                    }, 1000);

                } else if (isWaitingForPin) {
                    if (value.toLowerCase() === 'free7d' || value === '749201') {
                        // Success unlock state 2
                        state1.style.display = 'none';
                        state2.style.display = 'flex';
                        inputField.value = "";
                    } else {
                        alert("PIN salah! Gunakan PIN: free7d");
                    }
                }
            }
        });

        // App launches inside simulated alerts for visual interactive preview
        function launchApp(appName) {
            alert(`SÀLT+ OS: Meluncurkan aplikasi virtual "${appName}"...`);
        }

        // Deactivate System logic
        btnDeactivate.addEventListener('click', function() {
            isWaitingForEmail = false;
            isWaitingForPin = false;
            inputField.setAttribute('readonly', true);
            inputField.placeholder = "PIN";
            inputField.value = "";
            helperTooltip.style.display = "none";
            helperTooltip.textContent = "Enter email and press Enter to receive 6-digit token";
            
            state2.style.display = 'none';
            state1.style.display = 'flex';
        });
    </script>
</body>
</html>
